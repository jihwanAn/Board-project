<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board</title>
    <link rel="stylesheet" href="../assets/styles/style.css" />
    <script defer src="../scripts/Update.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1><a href="http://127.0.0.1:5500/public/index.html">Board</a></h1>
      </header>

      <main>
        <section class="board_update_wrap">
          <form id="updateForm">
            <div>제목 : <input type="text" name="subject" /></div>
            <div>내용 : <textarea name="content"></textarea></div>
          </form>
          <div class="btnForm">
            <button class="btn" onclick="history.back()">취소</button>
            <button class="btn" type="submit" form="updateForm">
              수정 완료
            </button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
